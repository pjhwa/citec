site_name: Grok Tech-docs   # 사이트 이름
site_description: "Grok 문서들 (최신 글 순)"   # 사이트 설명
site_url: "https://pjhwa.github.io/citec/"   # 사이트 URL

theme:
  name: material                # Material 테마 적용
  language: ko                  # 사이트 언어 (ko: 한국어)

plugins:
  - search                      # 검색 기능 플러그인 (Material 테마 기본 포함)
  - blog:
      blog_dir: .               # 블로그 디렉토리 위치 ('.'로 설정하면 docs/가 블로그 루트)
      archive: false            # (선택) 별도 Archive 페이지 비활성화
      draft: false              # (선택) 초안 기능 비활성화

markdown_extensions:
  - admonition
  - codehilite

nav:
  - 홈: index.md
  - 모든 문서: posts/index.md   # (선택) blog_dir을 기본값 'blog'로 쓸 경우 예시
