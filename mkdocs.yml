site_name: Grok Docs
site_description: "Grok에 물어보고 얻은 답을 정리한 블로그"
site_url: "https://pjhwa.github.io/citec/"
theme:
  name: material
  language: ko
  features:
    - navigation.sections
    - navigation.indexes
  custom_dir: overrides

plugins:
  - search
  - blog:
      blog_dir: blog/posts
      archive: true
      archive_date_format: yyyy년 MM월
      pagination_per_page: 5

nav:
  - 홈: index.md
  - 블로그: blog/posts/index.md
