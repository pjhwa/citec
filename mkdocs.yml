site_name: Grok Docs
site_description: "Grok 문서 모음"
site_url: "https://pjhwa.github.io/citec/"

theme:
  name: material
  language: ko
  features:
    - navigation.sections
    - navigation.indexes

plugins:
  - search
  - blog:
      blog_dir: blog/posts
      archive: true
      archive_date_format: yyyy년 MM월
      pagination_per_page: 5

nav:
  - 홈: index.md
  - 블로그: blog/index.md
