site_name: Grok Tech-docs
site_description: "Grok 문서들 (최신 글 순)"
site_url: "https://pjhwa.github.io/citec/"

theme:
  name: material
  language: ko

use_directory_urls: true

extra:
  blog:
    date: !ENV ["BLOG_DATE", "2025-04-15"]

plugins:
  - search
  - blog:
      blog_dir: .
      blog_toc: true     # 각 문서 오른쪽에 목차 표시
      post_url_date_format: yyyy/MM      # URL 경로를 /yyyy/MM/slug 형식으로 구성
      categories: true   # 연도/월별 자동 분류 사용
      archive: false
      draft: false

markdown_extensions:
  - admonition
  - codehilite

nav:
  - 홈: index.md
