{% extends "main.html" %}
{% block content %}
  <h1>{{ page.title }}</h1>

  {% if page.meta.date %}
    <p><strong>{{ page.meta.date }}</strong></p>
  {% endif %}

  {{ page.content }}

  {% if page.meta.tags %}
    <p><strong>Tags:</strong> {{ page.meta.tags | join(", ") }}</p>
  {% endif %}
{% endblock %}
