name: Auto-generate mkdocs structure

on:
  push:
    paths:
      - "docs/*.md"

jobs:
  update-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run structure generator
        run: python .github/scripts/generate_structure.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/ mkdocs.yml
          git commit -m "🔄 자동 폴더 및 nav 갱신" || echo "No changes"
          git push
