name: Organize Blog Posts

on:
  push:
    branches: [main]
    paths:
      - 'docs/*.md'

jobs:
  organize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Move blog posts
        run: |
          mkdir -p docs/blog/posts
          for file in docs/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-*.md; do
            [ -e "$file" ] || continue
            filename=$(basename "$file")
            year=$(echo $filename | cut -d'-' -f1)
            month=$(echo $filename | cut -d'-' -f2)
            slug="docs/blog/posts/$year/$month"
            mkdir -p "$slug"
            git mv "$file" "$slug/$filename"
            echo "# ${year}년 ${month}월 블로그" > "$slug/index.md"
          done

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git commit -am "자동: 블로그 글 정리 및 이동" || echo "No changes"
          git push
