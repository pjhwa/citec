name: Organize Blog Posts by Date and Setup Index Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/*.md'

jobs:
  organize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Move blog posts and generate index pages
        run: |
          echo "📁 시작: 문서 정리 및 인덱스 자동 생성"
          mkdir -p docs/blog/posts
          shopt -s nullglob

          for file in docs/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]-*.md; do
            filename=$(basename "$file")
            datepart=$(echo "$filename" | cut -d'-' -f1-3)
            year=$(echo "$datepart" | cut -d'-' -f1)
            month=$(echo "$datepart" | cut -d'-' -f2)
            title=$(echo "$filename" | cut -d'-' -f4- | sed 's/.md$//')

            dest_dir="docs/blog/posts/$year/$month"
            dest_file="$dest_dir/$title.md"

            echo "→ $file → $dest_file"

            mkdir -p "$dest_dir"
            git mv "$file" "$dest_file"

            # 📄 월별 _index.md 생성 with 문서 수 + 수정일
            index_file="$dest_dir/_index.md"
            if [ ! -f "$index_file" ]; then
              # 문서 수
              post_count=$(find "$dest_dir" -maxdepth 1 -type f -name '*.md' ! -name '_index.md' | wc -l)

              # 마지막 수정일
              last_updated=$(git log -1 --format="%ad" --date=short -- "$dest_dir" || echo "날짜 정보 없음")

              echo "---" > "$index_file"
              echo "title: ${year}년 ${month}월 문서 모음" >> "$index_file"
              echo "---" >> "$index_file"
              echo "# ${year}년 ${month}월 문서 모음입니다." >> "$index_file"
              echo "" >> "$index_file"
              echo "- 총 문서 수: **${post_count}개**" >> "$index_file"
              echo "- 마지막 업데이트: **${last_updated}**" >> "$index_file"
              echo "" >> "$index_file"
              echo "_자동 생성된 소개 파일입니다._" >> "$index_file"
              git add "$index_file"
            fi
          done

          # 🏠 docs/index.md 생성 (사이트 메인)
          home_file="docs/index.md"
          if [ ! -f "$home_file" ]; then
            echo "---" > "$home_file"
            echo "title: 홈" >> "$home_file"
            echo "---" >> "$home_file"
            echo "# Citec 문서에 오신 것을 환영합니다 📝" >> "$home_file"
            echo "" >> "$home_file"
            echo "→ [블로그 문서 보기](blog/)" >> "$home_file"
            git add "$home_file"
          fi

          # 📰 docs/blog/index.md 생성 (블로그 메인)
          blog_file="docs/blog/index.md"
          if [ ! -f "$blog_file" ]; then
            echo "---" > "$blog_file"
            echo "title: 블로그" >> "$blog_file"
            echo "template: blog.html" >> "$blog_file"
            echo "---" >> "$blog_file"
            echo "# 🗂 블로그 최신 문서 목록" >> "$blog_file"
            echo "" >> "$blog_file"
            echo "좌측에서 연도와 월을 클릭하거나 아래에서 최신 문서를 탐색하세요." >> "$blog_file"
            git add "$blog_file"
          fi

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/blog/posts || true
          git rm docs/*.md || true
          git commit -m "🔁 자동 정리 + index.md/_index.md 업데이트" || echo "변경사항 없음"
          git push
