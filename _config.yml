title: "My Blog"
baseurl: "/citec"   # 프로젝트 페이지의 경우 리포지토리 이름으로 baseurl 설정
url: "https://사용자명.github.io"  # 사용자 GitHub Pages 주소 (사용자 페이지의 경우 baseurl 생략)

theme: minimal-mistakes-jekyll  # Gem 기반 테마 사용
plugins:
  - jekyll-paginate-v2
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

# timezone 설정 (한국)
timezone: "Asia/Seoul"

# 사이트 내비게이션 (필요시)
# ... (생략: Minimal Mistakes의 _data/navigation.yml 또는 config에 메뉴 정의 가능)

# Pagination 기본 설정 (사이트 전체 기본값)
pagination:
  enabled: true        # 페이지네이션 기능 활성화
  per_page: 5          # 한 페이지에 표시할 포스트 수 (최신순 5개)
  sort_field: "date"   # 날짜 필드를 기준으로 정렬
  sort_reverse: true   # 내림차순 (최신일자가 먼저)
  # paginate_path 기본값은 "/page/:num/" (여기서는 기본값 사용)

# Autopages 설정 – 카테고리별 자동 페이지 생성
autopages:
  enabled:
    - categories       # 카테고리별 페이지 자동생성 기능 사용
  categories:
    layout: "category-archive"
    title: ":cat"
    permalink: "/:cat/"  # 카테고리 이름을 URL 경로로 사용
